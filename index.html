<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lott's bg repos</title>
    <style>
        body { 
            background: #001420 !important; 
            color: #bfe2e6; 
            font-family: "Arial", sans-serif; 
            padding: 20px; 
            margin: 0;
        }
        h1 { 
            text-align: center; 
            color: #62ccba; 
            margin-bottom: 2px; 
        }
        p { text-align: center; margin-top: 5px; }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .all-cards-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            clear: both;
        }

        .single-card-box {
            background: #002c34;
            width: 300px;
            height: 270px;
            margin: 15px;
            border-radius: 8px;
            border: 1px solid #719da2;
            float: left;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }

        .single-card-box:hover {
            transform: scale(1.02);
            transition: 0.2s;
        }

        .img-style {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .text-padding {
            padding: 10px;
        }

        .file-name-text {
            font-weight: bold;
            display: block;
            text-align: center;
            width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .my-btn {
            background-color: #004742;
            color: white;
            padding: 5px;
            width: 90%;
            display: block;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            margin: 8px auto 0 auto;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <h1 id="main-heading">lott's bg repos</h1>
    <p>this is only made cuz discord compresses everything AAAHHH</p>
    
    <div class="all-cards-container" id="PUT_IMAGES_HERE"></div>

    <script>
        var ACCOUNT_NAME = 'Lott-osu';
        var REPO_NAME = 'lott-backgrounds';
        var global_api_url = "https://api.github.com/repos/" + ACCOUNT_NAME + "/" + REPO_NAME + "/contents/";

        async function doEverything() {
            try {
                let res = await fetch(global_api_url);
                let data = await res.json();
                console.log(data);

                const VALID_EXTS = new Set(['png', 'jpg', 'jpeg', 'webp', 'gif']);
                const filteredImages = data.filter(({ name }) => {
                    const ext = name.slice((name.lastIndexOf(".") - 1 >>> 0) + 2);
                    return VALID_EXTS.has(ext.toLowerCase());
                });

                if (filteredImages.length == 0) {
                    document.getElementById('PUT_IMAGES_HERE').innerHTML = "<p>NO IMAGES</p>";
                    return;
                }

                var finalHtmlString = "";
                for (var i = 0; i < filteredImages.length; i++) {
                    var currentImg = filteredImages[i];
                    
                    finalHtmlString += '<div class="single-card-box">' +
                        '<img class="img-style" src="' + currentImg.download_url + '" alt="image" loading="lazy">' +
                        '<div class="text-padding">' +
                            '<span class="file-name-text" title="' + currentImg.name + '">' + currentImg.name + '</span>' +
                            '<a href="' + currentImg.download_url + '" target="_blank" class="my-btn" download>view image</a>' +
                        '</div>' +
                    '</div>';
                }

                document.getElementById('PUT_IMAGES_HERE').innerHTML = finalHtmlString;

            } catch (err) {
                alert("AN ERROR HAS OCCURED");
                console.error(err);
            }
        }

        doEverything();

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        let mouseX = -1000;
        let mouseY = -1000;
        
        const maxalpha = 0.2;
        const boxSize = 25;
        const borderRadius = 5;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initGrid();
        }

        function initGrid() {
            points = [];
            const step = boxSize + 1;
            const offsetX = (canvas.width % step) / 2;
            const offsetY = (canvas.height % step) / 2;

            for (let x = offsetX; x < canvas.width; x += step) {
                for (let y = offsetY; y < canvas.height; y += step) {
                    points.push({ x: x, y: y, alpha: 0 });
                }
            }
        }

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('resize', resizeCanvas);

        let lastTime = performance.now();

        function animate(currentTime) {
            let dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            if (dt > 0.1) dt = 0.1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < points.length; i++) {
                let p = points[i];
                let dx = p.x - mouseX;
                let dy = p.y - mouseY;
                let dist = Math.sqrt(dx * dx + dy * dy);

                let targetAlpha = 0;
                if (dist <= 25) {
                    targetAlpha = 1;
                } else if (dist <= 150) {
                    targetAlpha = 1 - (dist - 25) * (1 / (150 - 25));
                }

                if (p.alpha < targetAlpha) {
                    let t = 1 - Math.sqrt(1 - Math.max(0, Math.min(1, p.alpha)));
                    t += dt;
                    if (t > 1) t = 1;
                    p.alpha = 1 - (1 - t) * (1 - t);
                    if (p.alpha > targetAlpha) p.alpha = targetAlpha;
                } else if (p.alpha > targetAlpha) {
                    let t = 1 - Math.sqrt(Math.max(0, Math.min(1, p.alpha)));
                    t += dt;
                    if (t > 1) t = 1;
                    p.alpha = (1 - t) * (1 - t);
                    if (p.alpha < targetAlpha) p.alpha = targetAlpha;
                }

                if (p.alpha > 0) {
                    ctx.beginPath();
                    ctx.roundRect(p.x - boxSize / 2, p.y - boxSize / 2, boxSize, boxSize, borderRadius);
                    ctx.fillStyle = `rgba(98, 204, 186, ${p.alpha * maxalpha})`;
                    ctx.fill();
                }
            }

            requestAnimationFrame(animate);
        }

        resizeCanvas();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
