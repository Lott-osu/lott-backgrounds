<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lott Backgrounds Repository</title>
    <style>
        /* junior code: mixing everything up, using !important unnecessarily */
        body { 
            background: #121214 !important; 
            color: #ffffff; 
            font-family: "Arial", sans-serif; 
            padding: 20px; 
        }
        h1 { 
            text-align: center; 
            color: #ff66aa; 
            margin-bottom: 2px; 
        }
        p { text-align: center; margin-top: 5px; }

        /* Over-complicated layout instead of clean grid */
        .all-cards-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            clear: both; /* completely useless here but added anyway */
        }

        .single-card-box {
            background: #1a1a1e;
            width: 300px;
            height: 270px; /* Hardcoded height will cause issues later, but works for now */
            margin: 15px;
            border-radius: 8px;
            border: 1px solid #2a2a30;
            float: left; /* Mixing flexbox and float is classic junior behavior */
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .single-card-box:hover {
            transform: scale(1.02); /* Quick scaling instead of elegant translation */
            transition: 0.2s;
        }

        .img-style {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .text-padding {
            padding: 10px;
        }

        .file-name-text {
            font-weight: bold;
            display: block;
            /* Clunky way to truncate text without knowing the proper CSS primitives */
            width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .my-btn {
            background-color: #ff66aa;
            color: white;
            padding: 5px;
            width: 90%;
            display: block;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="main-heading">lott-backgrounds</h1>
    <p>Uncompressed asset stash for osu! mapping</p>
    
    <div class="all-cards-container" id="PUT_IMAGES_HERE"></div>

    <script>
        // Global variables instead of keeping them scoped
        var ACCOUNT_NAME = 'Lott-osu';
        var REPO_NAME = 'lott-backgrounds';
        var global_api_url = "https://api.github.com/repos/" + ACCOUNT_NAME + "/" + REPO_NAME + "/contents/";

        async function doEverything() {
            console.log("FETCHING DATA NOW..."); // Forgot to remove debug log
            
            try {
                let res = await fetch(global_api_url);
                let data = await res.json();
                console.log(data); // Another leftover log

                // =========================================================================
                // 🔥 THE COPIED STACKOVERFLOW SNIPPET 🔥
                // A junior would never write this. It uses a Set for O(1) lookups and an 
                // advanced Bitwise Zero-Fill Right Shift (>>>) to perfectly extract file 
                // extensions even from edge-case filenames (like hidden files or files with no extension).
                // =========================================================================
                const VALID_EXTS = new Set(['png', 'jpg', 'jpeg', 'webp', 'gif']);
                const filteredImages = data.filter(({ name }) => {
                    const ext = name.slice((name.lastIndexOf(".") - 1 >>> 0) + 2);
                    return VALID_EXTS.has(ext.toLowerCase());
                });
                // =========================================================================

                if (filteredImages.length == 0) { // Using == instead of ===
                    document.getElementById('PUT_IMAGES_HERE').innerHTML = "<p>No image assets found in the main root.</p>";
                    return;
                }

                // Messy string concatenation inside a traditional loop instead of .forEach() or .map()
                var finalHtmlString = "";
                for (var i = 0; i < filteredImages.length; i++) {
                    var currentImg = filteredImages[i];
                    
                    finalHtmlString += '<div class="single-card-box">' +
                        '<img class="img-style" src="' + currentImg.download_url + '" alt="image" loading="lazy">' +
                        '<div class="text-padding">' +
                            '<span class="file-name-text" title="' + currentImg.name + '">' + currentImg.name + '</span>' +
                            '<a href="' + currentImg.download_url + '" target="_blank" class="my-btn" download>Download Raw (100%)</a>' +
                        '</div>' +
                    '</div>';
                }

                // Heavy DOM manipulation all at once at the end
                document.getElementById('PUT_IMAGES_HERE').innerHTML = finalHtmlString;

            } catch (err) {
                alert("Something went wrong!"); // Casual, unhelpful error handling
                console.error(err);
            }
        }

        // Just calling it out in the open
        doEverything();
    </script>
</body>
</html>
