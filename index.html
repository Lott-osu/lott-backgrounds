<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lott Backgrounds Repository</title>
    <style>
        body { font-family: sans-serif; background: #121214; color: #fff; padding: 20px; text-align: center; }
        h1 { margin-bottom: 5px; color: #ff66aa; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: #1a1a1e; border-radius: 8px; overflow: hidden; border: 1px solid #2a2a30; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s; position: relative; }
        .card:hover { transform: translateY(-3px); }
        .card img { width: 100%; height: 180px; object-fit: cover; display: block; background: #222; }
        .info { padding: 12px; font-size: 14px; display: flex; flex-direction: column; gap: 8px; }
        .filename { text-overflow: ellipsis; overflow: hidden; white-space: nowrap; font-weight: bold; color: #eee; }
        .btn { display: inline-block; background: #ff66aa; color: white; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 12px; transition: background 0.2s; }
        .btn:hover { background: #e04488; }
    </style>
</head>
<body>

    <h1>lott-backgrounds</h1>
    <p>Uncompressed asset stash for osu! mapping</p>
    
    <div class="grid" id="gallery"><!-- Images load here --></div>

    <script>
        // Adjust these variables to match your account
        const username = 'Lott-osu';
        const repo = 'lott-backgrounds';

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            try {
                // Fetches file tree directly from GitHub's public API
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const files = await response.json();
                
                // Filter files to only show common image extensions
                const imageExtensions = ['.png', '.jpg', '.jpeg', '.webp', '.gif'];
                const images = files.filter(file => 
                    imageExtensions.some(ext => file.name.toLowerCase().endsWith(ext))
                );

                if(images.length === 0) {
                    gallery.innerHTML = '<p>No image assets found in the main root.</p>';
                    return;
                }

                gallery.innerHTML = '';
                images.forEach(img => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${img.download_url}" alt="${img.name}" loading="lazy">
                        <div class="info">
                            <span class="filename" title="${img.name}">${img.name}</span>
                            <a href="${img.download_url}" target="_blank" class="btn" download>Download Raw (100%)</a>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                gallery.innerHTML = '<p style="color: red;">Error parsing repository content dynamically.</p>';
            }
        }

        loadGallery();
    </script>
</body>
</html>
