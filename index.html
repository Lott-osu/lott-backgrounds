<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lott's bg repos</title>
    <style>
        body { 
            background: #001420 !important; 
            color: #bfe2e6; 
            font-family: "Arial", sans-serif; 
            padding: 20px; 
        }
        h1 { 
            text-align: center; 
            color: #88CFCA; 
            margin-bottom: 2px; 
        }
        p { text-align: center; margin-top: 5px; }

        .all-cards-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            clear: both;
        }

        .single-card-box {
            background: #002c34;
            width: 300px;
            height: 270px;
            margin: 15px;
            border-radius: 8px;
            border: 1px solid #719da2;
            float: left;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .single-card-box:hover {
            transform: scale(1.02);
            transition: 0.2s;
        }

        .img-style {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .text-padding {
            padding: 10px;
        }

        .file-name-text {
            font-weight: bold;
            display: block;
            width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .my-btn {
            background-color: #004742;
            color: white;
            padding: 5px;
            width: 90%;
            display: block;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="main-heading">lott's bg repos</h1>
    <p>this is only made cuz discord compresses everything AAAHHH</p>
    
    <div class="all-cards-container" id="PUT_IMAGES_HERE"></div>

    <script>
        var ACCOUNT_NAME = 'Lott-osu';
        var REPO_NAME = 'lott-backgrounds';
        var global_api_url = "https://api.github.com/repos/" + ACCOUNT_NAME + "/" + REPO_NAME + "/contents/";

        async function doEverything() {
            try {
                let res = await fetch(global_api_url);
                let data = await res.json();
                console.log(data);

                const VALID_EXTS = new Set(['png', 'jpg', 'jpeg', 'webp', 'gif']);
                const filteredImages = data.filter(({ name }) => {
                    const ext = name.slice((name.lastIndexOf(".") - 1 >>> 0) + 2);
                    return VALID_EXTS.has(ext.toLowerCase());
                });

                if (filteredImages.length == 0) {
                    document.getElementById('PUT_IMAGES_HERE').innerHTML = "<p>NO IMAGES</p>";
                    return;
                }

                var finalHtmlString = "";
                for (var i = 0; i < filteredImages.length; i++) {
                    var currentImg = filteredImages[i];
                    
                    finalHtmlString += '<div class="single-card-box">' +
                        '<img class="img-style" src="' + currentImg.download_url + '" alt="image" loading="lazy">' +
                        '<div class="text-padding">' +
                            '<span class="file-name-text" title="' + currentImg.name + '">' + currentImg.name + '</span>' +
                            '<a href="' + currentImg.download_url + '" target="_blank" class="my-btn" download>Download Raw (100%)</a>' +
                        '</div>' +
                    '</div>';
                }

                document.getElementById('PUT_IMAGES_HERE').innerHTML = finalHtmlString;

            } catch (err) {
                alert("AN ERROR HAS OCCURED");
                console.error(err);
            }
        }

        doEverything();
    </script>
</body>
</html>
